# Render Blueprint — бекенд OSTRIE (FastAPI).
# Деплой: render.com → New + → Blueprint → під'єднати репозиторій M1rwana12/ostrie-barbershop.
# Render підхопить цей файл і створить web-сервіс автоматично.
services:
  - type: web
    name: ostrie-barbershop-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      # Стабільна версія Python з готовими wheels
      - key: PYTHON_VERSION
        value: 3.12.6
      # Дозволені джерела CORS — фронтенд на GitHub Pages
      - key: CORS_ORIGINS
        value: https://m1rwana12.github.io
      # Легасі токен (більше не використовується ендпоінтами)
      - key: ADMIN_TOKEN
        generateValue: true
      # JWT-секрет для підпису токенів сесій (Render згенерує)
      - key: JWT_SECRET
        generateValue: true
      # Початковий супер-адмін. ВАЖЛИВО: задай значення в дашборді ДО першого старту —
      # користувач створюється лише раз при першому seed (зміна пізніше не оновить пароль).
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      # Postgres — постійне сховище замість ефемерної SQLite.
      # Render підставить connection string з БД нижче.
      - key: DATABASE_URL
        fromDatabase:
          name: ostrie-db
          property: connectionString
      # Telegram — впиши значення вручну в дашборді Render (sync:false = не з репо)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

# Безкоштовна Postgres-БД на Render (постійні дані).
# Увага: free-Postgres на Render видаляється через ~30 днів — для портфоліо ок,
# для прод-навантаження варто перейти на платний план.
databases:
  - name: ostrie-db
    plan: free
    databaseName: ostrie
    user: ostrie
